name: Windows Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (blank = auto: v<version>-build.<run#>)"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build installer + portable exe
        run: npm run build:win

      - name: Resolve release tag
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            if ! printf '%s' "$INPUT_TAG" | grep -qE '^[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
              echo "::error::Invalid tag '$INPUT_TAG' — allowed characters: letters, digits, and . _ / -"
              exit 1
            fi
            tag="$INPUT_TAG"
          else
            ver="$(node -p "require('./package.json').version")"
            tag="v${ver}-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kongyo-spec-windows-x64
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish exe to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::A release for tag '$TAG' already exists. Re-run with a different tag, or delete the existing release and its tag first."
            exit 1
          fi
          flags=()
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          gh release create "$TAG" dist/*.exe \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Manual Windows x64 verification build from \`$REF_NAME\` (\`${GITHUB_SHA:0:7}\`)." \
            "${flags[@]}"
          {
            echo "### Windows build published"
            echo "Release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/$TAG"
          } >> "$GITHUB_STEP_SUMMARY"
