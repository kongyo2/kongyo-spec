name: Release

# 本番リリース用ワークフロー。
# semver タグ (例: v0.1.0) を push すると起動し、品質ゲート → Windows / macOS / Linux の
# 各ビルド → 安定版 GitHub Release の発行までを自動化する。
# プレリリースのタグ (例: v0.1.0-rc.1) は GitHub 上でも pre-release として公開される。
# 検証用のアドホックなビルドが欲しいときは windows-build.yml を使うこと。

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # 安定版: v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # プレリリース: v1.2.3-rc.1 など
  workflow_dispatch:
    inputs:
      prerelease:
        description: "GitHub Release を pre-release として公開する"
        required: false
        type: boolean
        default: false

# 既定は読み取りのみ。リリース発行を行う release ジョブだけが書き込み権限を持つ。
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 品質ゲート ────────────────────────────────────────────────
  # タグが指す commit が lint / format / typecheck を満たすことを保証する。
  verify:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - task: Lint
            script: lint:ci
          - task: Format
            script: format:check
          - task: Typecheck
            script: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.script }}

  # ── リリースメタデータの解決 ──────────────────────────────────
  # タグ／バージョンの整合性をビルド前に検証し、tag・version・prerelease を出力する。
  # ここで失敗すれば、高コストな各プラットフォームのビルドは走らない。
  prepare:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          pkgver="$(node -p "require('./package.json').version")"

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            # タグ起動: タグの version が package.json と一致することを必須とする。
            tag="$REF_NAME"
            tagver="${tag#v}"
            if [ "$tagver" != "$pkgver" ]; then
              echo "::error::Tag '$tag' (version '$tagver') does not match package.json version '$pkgver'. Bump package.json and re-tag so the release stays consistent."
              exit 1
            fi
            # semver のプレリリース接尾辞 (例: -rc.1) があれば pre-release 扱い。
            case "$tagver" in
              *-*) prerelease=true ;;
              *) prerelease=false ;;
            esac
          else
            # 手動起動: package.json の version からタグを導出し、新規作成する。
            tag="v${pkgver}"
            prerelease="${INPUT_PRERELEASE:-false}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "::error::A release for tag '$tag' already exists. Bump the version in package.json before cutting a new release."
              exit 1
            fi
            if git ls-remote --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "::error::Tag '$tag' already exists on the remote. Bump the version or delete the existing tag first."
              exit 1
            fi
          fi

          {
            echo "tag=$tag"
            echo "version=$pkgver"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$tag version=$pkgver prerelease=$prerelease"

  # ── ビルド (Windows / macOS / Linux) ─────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: [verify, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            script: build:win
            artifacts: dist/*.exe
          - name: macOS (arm64 + x64)
            os: macos-latest
            script: build:mac
            artifacts: dist/*.dmg
          - name: Linux x64
            os: ubuntu-latest
            script: build:linux
            artifacts: dist/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build distributables
        run: npm run ${{ matrix.script }}
        env:
          # 証明書のない CI では macOS のコード署名を試みない。
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload distributables
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # ── 公開 ──────────────────────────────────────────────────────
  # 全プラットフォームの成果物を集約し、GitHub Release を 1 度だけ発行する。
  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all distributables
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artifacts/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No build artifacts were found to publish."
            exit 1
          fi
          # タグ起動時はタグが既存なので --target は無視される。
          # 手動起動時は --target で現在の commit にタグを新規作成する。
          flags=(--generate-notes --target "$GITHUB_SHA" --title "$TAG")
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          gh release create "$TAG" "${files[@]}" "${flags[@]}"
          {
            echo "### 🚀 Release published"
            echo "Release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/$TAG"
            echo ""
            echo "| Asset |"
            echo "| --- |"
            for f in "${files[@]}"; do echo "| \`$(basename "$f")\` |"; done
          } >> "$GITHUB_STEP_SUMMARY"
