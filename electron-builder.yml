appId: com.kongyo2.kongyo-spec
productName: Kongyo Spec
copyright: Copyright © 2026 kongyo2
directories:
  output: dist
files:
  - out/**/*
  - resources/icon.png
  - package.json
  - "!node_modules/**/*"
  - node_modules/zod/**/*
win:
  icon: build/icon.ico
  executableName: kongyo-spec
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  identity: null # CI にコード署名証明書がないため署名しない
  target:
    - target: dmg
      arch: [arm64, x64]
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  icon: build/icon.png
  category: Development
  synopsis: Desktop markdown spec editor for AI-driven development
  target:
    - target: AppImage
      arch: [x64]
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
npmRebuild: false
